sector.terra-verilus.name = Верилус
sector.terra-verilus.description = Это скопление астероидов богато залежами титана и свинца, но бедно другими ресурсами. \n[stat]Пространственная аномалия[] сделала окружение нестабильным — оно окончательно стабилизируется только при высадке. Будьте готовы к изменению рельефа при потери сектора. \nНеизвестная вражеская фракция будет пытаться уничтожить вас, используйте любые средства для удержания позиции.

item.terra-carbon.name = Углерод
item.terra-carbon.description = Используется в производстве других материалов как продвинутое металлургическое топливо. 
item.terra-carbon.details = Основа жизни. Аморфен в текущем виде. Имеет способность образовывать устойчивые цепи или циклы атомов, благодаря чему возможно формирование сложной органики.
item.terra-cryotite.name = Криотит
item.terra-cryotite.description = Используется в замораживающем оружии и продвинутых защитных сооружениях. При определенных условиях взрывается, радикально поглощая тепло.
item.terra-dark-steel.name = Темная сталь
item.terra-dark-steel.description = Тяжелый и высокопрочный сплав, использующийся в оборонительных сооружениях и продвинутых производственных механизмах. Обладает свойством сверхпроводимости.
item.terra-tesseract.name = Тессеракт
item.terra-tesseract.description = Используется в качестве чудовищного вооружения или почти бесконечного генератора энергии. Крайне опасен, [red]не рекомендуется хранить в ядрах.[]
item.terra-tesseract.details = Создание и удержание чёрных дыр процесс крайне затруднителен и происходит на субатомном уровне. Производство возможно только при специфических условиях, которые существуют на Верилусе. Из-за невозможности стабилизации может повреждать носитель.
item.terra-titanium-plate.name = Титаново-кремниевая пластина
item.terra-titanium-plate.description = Используется в броне и несущих конструкциях.
item.terra-diamond-dust.name = Алмазная пыль
item.terra-diamond-dust.description = Используется в продвинутых технологиях и укреплениях.
item.terra-diamond-glass.name = Алмазное стекло
item.terra-diamond-glass.description = Используется в лазерных линзах и термостойких конструкций.
item.terra-raw-thermoxite.name = Сырой термоксит
item.terra-raw-thermoxite.description = Имеет ряд узконаправленных применений, в связи с мало изучеными свойствами и повидением.
item.terra-raw-thermoxite.details = Следствие пространственной аномалии. Произрастает из углерода, медленно заменяя атомы углерода на другие. Кристаллы слабо радиоактивны и могут иметь заряд.
item.terra-thermoxite.name = Термоксит
item.terra-thermoxite.description = Имеет ряд узконаправленных применений, в связи с мало изучеными свойствами и повидением.
item.terra-thermoxite.details = Чистые кристаллы Термоксита могут увеличивать свои способности. Полное заражение углерода термокситом происходит за больший промежуток времени, тем не менее, этот процесс можно ускорить.
item.terra-uranium.name = Уран
item.terra-uranium.description = Используется в ядерных реакторах для выработки энергии.
item.terra-plutonium.name = Плутоний
item.terra-plutonium.description = Используется в ядерном оружии и энергетике.
item.terra-fissile-crystals.name = Нестабильный кристалл
item.terra-fissile-crystals.description = Используется в качестве катализатора в спецефических ситуациях.
item.terra-gamma-cell.name = Стабильная гамма-ячейка
item.terra-gamma-cell.description = Используется в электрических стабилизаторов и выработки энергии.
item.terra-silver.name = Серебро
item.terra-silver.description = Имеет ряд узконаправленных применений, в связи с мало изучеными свойствами и повидением.
item.terra-silver.details = Этот материал был привезён из другой звёздной системы, или даже галактики. Редкость и ограниченные количества не позволяют нормально изучить и использовать его.
item.terra-radium.name = Радий
item.terra-radium.description = Чрезвычайная радиоактивность делает его применение более комплексным. [red]Не рекомендуется хранить в ядрах.[]
item.terra-cesium.name = Цезий
item.terra-cesium.description = Ядерные отходы, вызванные взрывом ядерной бомбы. Не имеет применения. [red]Не рекомендуется хранить вообще.[]
item.terra-fish.name = Рыба
item.terra-fish.description = Применение неизвестно. Является вымершим видом Серпуло.
item.terra-sodium.name = Натрий
item.terra-sodium.description = Используется в качестве взрывного и воспламеняемого реагента и в смесях.
item.terra-tantalium.name = Тантал
item.terra-tantalium.description = Используется в конденсаторах и термостойких конструкциях.
item.terra-tantalium.details = Тантал (Ta): Атомный номер - 73; Относительная атомная масса - 180,948.\n[darkGray]      - Таблица Менделеева[]
item.terra-ruthenium.name = Рутений
item.terra-ruthenium.description = Используется в энергетике и термостойких сплавах
item.terra-ruthenium.details = Рутений (Ru): Атомный номер - 44; Относительная атомная масса - 101,07.\n[darkGray]       - Таблица Менделеева[]
item.terra-obsidian-powder.name = Обсидиановый порошок
item.terra-obsidian-powder.description = Используется для термоизоляции и строительства.
item.terra-tenirite.name = Тенирит
item.terra-tenirite.description = Используется в высокопрочных конструкциях и системах терморегуляции.
item.terra-tenirite.details = Кристаллы образованные под огромным давлением в недрах магмовых бассейнов. Крайне прочные и редкие, тем не менее, при больших температурах они становятся очень хрупкими и могут легко разрушится.

liquid.terra-carbon-dioxide.name = Углекислый газ
liquid.terra-carbon-dioxide.description = Используется в системах охлаждения и синтезе углеродсодержащих соединений.
liquid.terra-fissile-plasma.name = Нестабильная плазма
liquid.terra-fissile-plasma.description = Используется как разрушительный реагент и компонент для синтеза.
liquid.terra-fissile-plasma.details = Побочный продукт Антиматериального коллайдера крайне нестабилая и горячая. Рекомендуется утилизировать выбрасывая её в атмосферу, так как она быстро саморазрушается при рассеивании.
liquid.terra-magma.name = Магма
liquid.terra-magma.description = Используется в геотермальных генераторах и высокотемпературной плавке.
liquid.terra-neon.name = Неон
liquid.terra-neon.description = Используется в криогенных системах и сверхпроводящих магнитах.

unit.terra-flight-lead-missile.name = Свинцовая ракета Полёта
unit.terra-flight-lead-missile.description = Стандартный боеприпас для турели «Полёт». Может быть сбит в полете.
unit.terra-flight-metaglass-missile.name = Осколочная ракета Полёта
unit.terra-flight-metaglass-missile.description = Осколочный боеприпас для турели «Полёт». Может быть сбит в полете.
unit.terra-flight-titanium-missile.name = Титановая ракета Полёта
unit.terra-flight-titanium-missile.description = Тяжелый боеприпас для турели «Полёт». Может быть сбит в полете.
unit.terra-aircraft-thorium-missile.name = Ториевая ракета Авиации
unit.terra-aircraft-thorium-missile.description = Стандартный боеприпас для турели «Авиация». Может быть сбит в полете.
unit.terra-aircraft-thermoxite-missile.name = Термокситовая ракета Авиации
unit.terra-aircraft-thermoxite-missile.description = Тяжелый боеприпас для турели «Авиация». Может быть сбит в полете.
unit.terra-aircraft-fissile-missile.name = Нестабильная ракета Авиации
unit.terra-aircraft-fissile-missile.description = Газовый боеприпас для турели «Авиация». Может быть сбит в полете.
unit.terra-basic-assembly-drone.name = Базовый сборочный дрон
unit.terra-basic-assembly-drone.description = Уникальный дрон, собирающий единицы на специальных блоках.
unit.terra-basic-assembly-drone.details = Первая версия сборочного дрона с Эрекира.
unit.terra-latum.name = Латум (копия)
unit.terra-latum.description = Ты не должен это видеть... По крайней мене не сейчас.
unit.terra-tau.name = Тау
unit.terra-wick.name = Фитиль
unit.terra-wick-c.name = Фитиль
unit.terra-wick-c.description = Ты не должен это видеть.
