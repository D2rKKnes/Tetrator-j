block.terra-basic-assembler.name = Базовый сборщик
block.terra-basic-assembler.description = Собирает базовых юнитов из введёных предметов и жидкостей.
block.terra-advanced-assembler.name = Продвинутый сборщик
block.terra-advanced-assembler.description = Собирает продвинутых юнитов из введёных предметов и жидкостей.

block.terra-metaglass-wall.name = Метастеклянная стена
block.terra-metaglass-wall.description = Защищает постройки от вражеских снарядов, высвобождая из себя осколки при повреждении.
block.terra-metaglass-wall-large.name = Большая метастеклянная стена
block.terra-metaglass-wall-large.description = Защищает постройки от вражеских снарядов, высвобождая из себя осколки при повреждении.
block.terra-metaglass-wall-huge.name = Огромная метастеклянная стена
block.terra-metaglass-wall-huge.description = Защищает постройки от вражеских снарядов, высвобождая из себя осколки при повреждении.
block.terra-dark-steel-wall.name = Стена из тёмной стали
block.terra-dark-steel-wall.description = Защищает постройки от вражеских снарядов. Поглощает лазеры и электрически разряды. Черезвычайно прочная.
block.terra-dark-steel-wall-large.name = Большая стена из тёмной стали
block.terra-dark-steel-wall-large.description = Защищает постройки от вражеских снарядов. Поглощает лазеры и электрически разряды. Черезвычайно прочная.
block.terra-scrap-wall-colossol.name = Колосальная стена из металлолома
block.terra-scrap-wall-colossol.description = Защищает постройки от вражеских снарядов.

block.terra-reinforced-solar-panel.name = Усиленная солнечная панель
block.terra-reinforced-solar-panel.description = Обеспечивает небольшим количеством энергии от солнца.
block.terra-beam-beacon.name = Лучевой маяк
block.terra-beam-beacon.description = Экспериментальная версия лучевого узла с гигантской дальностью. Хранит большое количество энергии.

block.terra-graphite-conveyor.name = Графитовый конвейер
block.terra-graphite-conveyor.description = Специальная версия конвейера, предназначенная для транспортировки предметов в космосе. Немного быстрее медного конвейера.
block.terra-graphite-junction.name = Графитовый перекрёсток
block.terra-graphite-junction.description = Действует как мост для двух пересекающихся конвейерных лент.
block.terra-graphite-gate.name = Графитовый затвор
block.terra-graphite-gate.description = Имеет 2 режима. Выводит предметы по бокам, если передний путь заблокирован в режиме по умолчанию или выводит предметы вперед, только если боковые пути заблокированы в инвертированном режиме.
block.terra-graphite-gate.details = Попробуй обе и реши, на чьей стороне ты!
block.terra-graphite-router.name = Графитовый маршрутизатор
block.terra-graphite-router.description = Равномерно распределяет входящие предметы по 3 выходящим направлениям. Может быть настроен как сортировщик предметов.
block.terra-graphite-router.details = Эволюционировавшее зло. Теперь из графита и свинца. Отныне числится межпланетной угрозой.
block.terra-graphite-bridge.name = Графитовый мостовой конвейер
block.terra-graphite-bridge.description = Перемещает предметы над местностью или зданиями. Имеет больший радиус, чем обычный мостовой конвейер.
block.terra-small-driver.name = Предметная катапульта
block.terra-small-driver.description = Постройка для дальней транспортировки предметов. Собирает несколько предметов и затем стреляет ими в другие катапульты. Слабая конструкция не позволяет ей транспортировать предметы на большие расстояния.

block.terra-pulse-drill.name = Импульсный бур
block.terra-pulse-drill.description = При размещении на соответствующей руде, постоянно выводит предметы очередями. Способен добывать титан.
block.terra-plasma-drill.name = Плазменный бур
block.terra-plasma-drill.description = Использует эксперементальную технологию для быстрой добычи. Способен добывать торий.
block.terra-beam-mining-facility.name = Лучевая добывающая установка
block.terra-beam-mining-facility.description = Использует лучшие ресурсы и постоянное охлаждение для максимальной скорости добычи.

block.terra-graphite-miner.name = Графитовый экстрактор
block.terra-graphite-miner.description = Добывает графит из определённых стен. Работает только в космосе.
block.terra-sand-extractor.name = Песчаный экстрактор
block.terra-sand-extractor.description = При размещении на кремнесодержащей породе дробит ее, выводя песок в медленном темпе. 
block.terra-ice-melter.name = Плавитель льда
block.terra-ice-melter.description = Плавит лёд под собой, выводя воду в медленном темпе.
block.terra-mechanical-well.name = Механическая скважина
block.terra-mechanical-well.description = При размещении на углеродосодержащей породе сверлит ее, выводя углерод. Имеет шанс на вывод графита.
block.terra-bisilicon-oven.name = Бикремниевая печь
block.terra-bisilicon-oven.description = Выплавляет кремний из песка, используя углерод как топливо и выделяя угарный газ в окружающую среду. Метастекло является полезным побочным продуктом основной реакции и укрепляется с помощью добавления свинца.

block.terra-core-solaris.name = Ядро: «Солярис»
block.terra-core-solaris.description = Ядро базы. Бронировано лучше, чем ядро «Осколок». Вырабатывает небольшое количество электроэнергии за счет встроенной солнечной панели.
block.terra-core-solaris.details = Альтернативная узконаправленная космическая итерация.

block.terra-weak-node.name = Слабый узел
block.terra-weak-node.description = Отсутствие меди сильно ограничивает способы базовой передачи и хранения энергии. Этот узел является более слабой версией силового узла, рекомендуется как можно скорее перейти на более продвинутые технологии.

block.terra-flight.name = Полёт
block.terra-flight.description = Выпускает во врагов самонаводящиеся ракеты.

stat.hitChance = Шанс снаряда
stat.hitAmount = Количество снарядов
