unit.terra-basic-assembly-drone.name = Базовый сборочный дрон
unit.terra-basic-assembly-drone.description = Уникальный дрон, собирающий единицы на специальных блоках.
unit.terra-basic-assembly-drone.details = Первая версия сборочного дрона с Эрекира.
