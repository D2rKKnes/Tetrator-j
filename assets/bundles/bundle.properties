item.terra-carbon.name = Carbon
item.terra-carbon.description = Used in the production of other materials as an advanced metallurgical fuel.
item.terra-carbon.details = The basis of life. Amorphous in its current form. Carbon has the ability to form stable chains or cycles of atoms, making it possible to form complex organic matter.
item.terra-dark-steel.name = Dark Steel
item.terra-dark-steel.description = A heavy and highly durable alloy used in defensive structures and advanced manufacturing machinery. Has the property of superconductivity.

unit.terra-flight-lead-missile.name = Lead Flight Missile
unit.terra-flight-lead-missile.description = Standard ammo for the Flight turret. Can be shot down.
unit.terra-flight-metaglass-missile.name = Flight Missile
unit.terra-flight-metaglass-missile.description = Fragmentation ammo for the Flight turret. Can be shot down.
unit.terra-flight-titanium-missile.name = Titanium Flight Missile
unit.terra-flight-titanium-missile.description = Heavy ammo for the Flight turret. Can be shot down.

block.terra-metaglass-wall.name = Metaglass wall
block.terra-metaglass-wall.description = Protects buildings from enemy projectiles, releasing shards when damaged.
block.terra-metaglass-wall-large.name = Large Metaglass wall
block.terra-metaglass-wall-large.description = Protects buildings from enemy projectiles, releasing shards when damaged. Releases more shards than a metaglass wall.
block.terra-metaglass-wall-huge.name = Huge Metaglass wall
block.terra-metaglass-wall-huge.description = Protects buildings from enemy projectiles, releasing shards when damaged. Releases more shards than a large metaglass wall.

block.terra-reinforced-solar-panel.name = Reinforced solar panel
block.terra-reinforced-solar-panel.description = Provides a small amount of power from the sun.
block.terra-beam-beacon.name = Beam beacon
block.terra-beam-beacon.description = An experimental version of a beam node with a gigantic range. Stores a large amount of power.
block.terra-graphite-miner.name = Graphite extractor
block.terra-graphite-miner.description = Extracts graphite from specific walls. Works only in space.
block.terra-graphite-conveyor.name = Graphite conveyor
block.terra-graphite-conveyor.description = A special version of the conveyor designed for transporting items in space. Slightly faster than a standard conveyor.
block.terra-graphite-junction.name = Graphite junction
block.terra-graphite-junction.description = Acts as a bridge for two crossing conveyor belts.
block.terra-graphite-gate.name = Graphite Gate
block.terra-graphite-gate.description = Has 2 modes. Brings items to the sides if the front path is blocked in default mode, or brings items to the front only if the side paths are blocked in inverted mode.
block.terra-graphite-gate.details = Try both and pick a side!
block.terra-graphite-router.name = Graphite Router
block.terra-graphite-router.description = Distributes incoming items evenly into 3 outgoing directions. Can be configured as an item sorter.
block.terra-graphite-router.details = Evolved Evil. Now made of graphite and lead. From now on it is considered an interplanetary threat.
block.terra-graphite-bridge.name = Graphite bridge conveyor
block.terra-graphite-bridge.description = Transports items over terrain or buildings. Have more range than standart bridge conveyor.
block.terra-pulse-drill.name = Pulse drill
block.terra-pulse-drill.description = When placed on ore, outputs items in bursts indefinitely. Cannot be boosted.
block.terra-sand-extractor.name = Sand Extractor
block.terra-sand-extractor.description = When placed on siliceous rock, it crushes it, digging sand at a slow pace. 
block.terra-mechanical-well.name = Mechanical Well
block.terra-mechanical-well.description = When placed on carbon-containing rock, drills into it, digging the carbon. Has a 15% chance of digging graphite.
block.terra-bisilicon-oven.name = Bisilicon Oven
block.terra-bisilicon-oven.description = Smelts silicon from sand, using carbon as fuel and releasing carbon monoxide into the environment. Metaglass is a useful by-product of the main reaction and is strengthened by the addition of lead.
block.terra-core-solaris.name = Core: «Solaris»
block.terra-core-solaris.description = Base core. Better armored than the Shard core. Generates a small amount of electricity due to the built-in solar panel.
block.terra-core-solaris.details = Alternate focused space iteration.
block.terra-weak-node.name = Weak node
block.terra-weak-node.description = The lack of copper severely limits basic energy transmission and storage methods. This node is a weaker version of the power node; it is recommended to migrate to more advanced technologies as soon as possible.

